# ee/ is deliberately NOT a workspace member: reserved for post-gate closed
# SaaS scaffolding, empty pre-gate (ADR-013).
packages:
  - apps/*
  - packages/*

allowBuilds:
  cpu-features: false
  esbuild: true
  msgpackr-extract: false
  protobufjs: false
  ssh2: false

# typescript is capped at 6.x: 7.x is the native (tsgo) port and typescript-eslint
# peers require <6.1. @types/node tracks the Node 22 runtime (engines, Dockerfile).
catalog:
  "@types/node": ^22.10.0
  eslint: ^10.0.0
  tsx: ^4.19.0
  typescript: ~6.0.3
  vitest: ^4.1.0
  zod: ^4.0.0

onlyBuiltDependencies:
  - esbuild
