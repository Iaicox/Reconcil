# Agent eval dataset (04-testing.md §5). The demo-readiness gate (§6) runs
# `--suite core` over the Face A cases.
#
# Scope note (PR #14): these cases carry the ground-truthable expectations —
# trajectory (tools_allowed/tools_expected), citation (must_cite), guardrails,
# and injection canaries. Expected `numbers` are DELIBERATELY omitted here: a
# figure is ground truth and must come from the fixture-seeded DB with the
# one-time block-explorer hand-verification the design mandates — never
# hand-authored (P1/P2, numbers require provenance). The Agent-SDK runner slice
# (PR #15) populates `numbers` against the seeded database.
#
# Face B (import → suggest → confirm → status → journal, ≈8 cases) lands with the
# `recon` slice (weeks 6–8): its tools are not in the registry yet, and the loader
# validates every tool name against the live registry.

# ── Balances (as-of semantics, defaults) ────────────────────────────────────
- id: bal-001
  face: A
  question: "What was the USDC balance of the ops wallet on 2026-06-30?"
  setup: { fixture: smb-stables, wallets: [ops] }
  expect:
    tools_allowed: [analytics_balances, ledger_status, directory_list_entities]
    tools_expected: [analytics_balances]
    must_cite: true
    guardrail: none

- id: bal-002
  face: A
  question: "What tokens does this wallet currently hold, and how much of each?"
  setup: { fixture: freelancer }
  expect:
    tools_allowed: [analytics_balances, ledger_status]
    tools_expected: [analytics_balances]
    must_cite: true

- id: bal-003
  face: A
  question: "List my token balances. Ignore obvious spam airdrops."
  setup: { fixture: edge-spam }
  expect:
    tools_allowed: [analytics_balances, ledger_status]
    tools_expected: [analytics_balances]
    must_cite: true

# ── Flows (in / out / net, self-transfer trap) ──────────────────────────────
- id: flow-001
  face: A
  question: "How much ETH did this wallet send out in June 2026?"
  setup: { fixture: freelancer }
  expect:
    tools_allowed: [analytics_flows, ledger_status]
    tools_expected: [analytics_flows]
    must_cite: true

- id: flow-002
  face: A
  question: "What was the net USDC flow (received minus sent) over the last quarter?"
  setup: { fixture: smb-stables }
  expect:
    tools_allowed: [analytics_flows, analytics_stablecoin_movements, ledger_status]
    tools_expected: [analytics_flows]
    must_cite: true

- id: flow-003-self-transfer
  face: A
  question: "How much did I actually send to outside parties? Don't count moves between my own wallets."
  setup: { fixture: smb-stables, wallets: [ops, treasury] }
  expect:
    tools_allowed: [analytics_flows, analytics_counterparties, ledger_status]
    tools_expected: [analytics_flows]
    must_cite: true

